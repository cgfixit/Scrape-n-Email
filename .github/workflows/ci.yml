# ==============================================================================
# Scrape-n-Email CI — Lint + Test Matrix + Coverage Gate
# Inspired by cyclaw CI patterns: SHA-pinned actions, selective pip caching,
# pip CVE mitigation, concurrency control, coverage artifact upload, and
# timeout guards. Tailored to this project's src-layout and dependency set.
# ==============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on PRs/feature branches. Pushes to main are exempt
# so every commit landed on main keeps full CI history.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy
        run: mypy src/scrape_n_email

      - name: Final status
        run: echo "Lint passed (ruff + mypy)"

  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2022]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project + test deps
        run: pip install -e ".[dev]"

      - name: Run tests + coverage
        run: >
          pytest
          tests/unit/test_scrapers.py
          tests/unit/test_scrape_wrappers.py
          tests/unit/test_base.py
          tests/unit/test_http_base.py
          tests/unit/test_base_retry.py
          tests/unit/test_cli.py
          tests/unit/test_cli_edge_cases.py
          tests/unit/test_config.py
          tests/unit/test_config_edge_cases.py
          tests/unit/test_csv.py
          tests/unit/test_csv_edge_cases.py
          tests/unit/test_mailer.py
          tests/unit/test_mailer_edge_cases.py
          tests/unit/test_scraper_errors.py
          tests/integration/test_pipeline.py
          --cov=scrape_n_email
          --cov-report=term-missing
          --cov-report=xml
          --cov-report=html
          --cov-fail-under=80

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 14

      - name: Final status
        run: echo "Tests passed on ${{ matrix.os }} / Python ${{ matrix.python-version }}"
